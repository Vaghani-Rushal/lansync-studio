appId: com.pcconnector.desktop
productName: PC Connector

directories:
  output: release

files:
  - dist/**
  - dist-electron/**
  - package.json

asar: true

mac:
  target:
    - dmg
  category: public.app-category.productivity

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

